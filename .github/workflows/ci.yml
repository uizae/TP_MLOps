name: CI - Tests et Build Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Tests Python
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Entrainement du modele
        run: python src/mlops_tp/train.py
        env:
          PYTHONPATH: src

      - name: Lancement des tests
        run: pytest tests/test_training.py tests/test_inference.py -v
        env:
          PYTHONPATH: src

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Build de l image Docker
        run: docker build -f Dockerfile.api -t heart-disease-api .